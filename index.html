<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a472a">
  <meta name="description" content="2.5D中国麻将 — 四人单机，支持手机平板横屏">
  <link rel="manifest" href="manifest.json">
  <title>2.5D 中国麻将</title>
  <link rel="stylesheet" href="css/style.css?v=15">
</head>
<body>
  <div id="rotate-hint" class="rotate-hint hidden">
    <div class="rotate-box">
      <div class="rotate-icon">📱↻</div>
      <p>建议横屏游玩</p>
      <p class="sub">旋转设备以获得最佳 2.5D 视野</p>
      <button type="button">知道了</button>
    </div>
  </div>

  <div id="app">
    <div id="start-screen" class="screen">
      <div class="start-panel">
        <h1>🀄 2.5D 中国麻将</h1>
        <p class="subtitle">立体牌桌 · 你对战三位电脑 · 国标简化规则</p>
        <p class="saved-diff">当前难度：<span id="saved-diff-name">普通</span></p>

        <div class="avatar-setup">
          <p class="setup-label">选择您的头像与昵称</p>
          <div class="avatar-preview-row">
            <div id="avatar-preview" class="avatar-circle large">🧑</div>
            <input id="player-name-input" class="name-input" type="text" maxlength="8" placeholder="输入昵称" value="东家">
          </div>
          <div id="avatar-grid" class="avatar-grid"></div>
        </div>

        <div id="difficulty-grid" class="diff-grid"></div>
        <ul class="rule-hints">
          <li>136 张牌：万筒条 + 风牌 + 箭牌</li>
          <li>支持吃（上家）、碰、杠、胡</li>
          <li>胡牌：4 组面子 + 1 对将，或七对</li>
          <li>2.5D 立体视角，大牌面，推荐横屏</li>
          <li>🔊 背景音乐 + 🗣️ 中文语音（碰杠吃胡）</li>
        </ul>
      </div>
    </div>

    <div id="game-screen" class="screen hidden">
      <header class="top-bar">
        <div class="top-left">
          <span id="app-version" class="app-version" title="游戏版本"></span>
          <span id="diff-tag">⚔️ 普通</span>
          <span>第 <span id="round-num">1</span> 局</span>
          <span>牌墙 <span id="wall-count">0</span></span>
        </div>
        <div id="msg-text" class="msg-text">准备开始</div>
        <div class="top-right">
          <button id="btn-status" type="button" class="icon-btn btn-status-toggle" title="局面面板">📋</button>
          <button id="btn-bgm" type="button" class="icon-btn" title="背景音乐">🔊</button>
          <button id="btn-voice" type="button" class="icon-btn" title="中文语音">🗣️</button>
          <button id="btn-menu" type="button" class="icon-btn" title="返回">☰</button>
        </div>
      </header>

      <div class="table-wrap">
        <aside id="status-panel" class="status-panel">
          <h3 class="status-title">📋 局面</h3>
          <div id="status-situation" class="status-block"></div>
          <div class="status-divider"></div>
          <h3 class="status-title">👤 我的数据</h3>
          <div id="status-stats" class="status-stats"></div>
        </aside>

        <div class="scene-25d">
          <div class="table-stage">
            <div class="table-surface">
              <div class="table-rim"></div>
              <div class="table-felt">
                <div id="center-discard" class="center-discard"></div>
                <div class="wall-indicator">牌墙剩余</div>
              </div>
            </div>

            <div class="seat seat-top" data-seat="top">
              <div id="card-top" class="player-card"></div>
              <div id="discards-top" class="discards"></div>
              <div id="hand-top" class="hand-zone"></div>
              <div id="melds-top" class="melds"></div>
            </div>

            <div class="seat seat-left" data-seat="left">
              <div id="card-left" class="player-card vertical"></div>
              <div id="discards-left" class="discards"></div>
              <div id="hand-left" class="hand-zone"></div>
              <div id="melds-left" class="melds"></div>
            </div>

            <div class="seat seat-right" data-seat="right">
              <div id="card-right" class="player-card vertical"></div>
              <div id="discards-right" class="discards"></div>
              <div id="hand-right" class="hand-zone"></div>
              <div id="melds-right" class="melds"></div>
            </div>
          </div>

          <!-- 玩家操作区：独立于 3D 牌桌，避免选牌/提示被桌面遮挡 -->
          <div class="player-dock">
            <div id="player-hint" class="player-hint hidden">
              <div id="hint-step" class="hint-step">① 点击手牌</div>
              <div id="hint-main" class="hint-main">建议打出【—】</div>
              <div id="hint-sub" class="hint-sub">再点下方「打出」按钮确认</div>
            </div>
            <div class="player-dock-table">
              <div id="discards-bottom" class="discards discards-self"></div>
              <div id="melds-bottom" class="melds melds-self"></div>
              <div id="card-bottom" class="player-card player-self"></div>
            </div>
            <div id="hand-bottom" class="hand-zone hand-player"></div>
          </div>
        </div>
      </div>

      <div id="action-bar" class="action-bar"></div>

      <div id="flow-overlay" class="flow-overlay hidden">
        <div class="flow-card">
          <div id="flow-icon" class="flow-icon">🀄</div>
          <div id="flow-dice" class="flow-dice hidden">
            <div class="die" id="die1"><span class="die-face">?</span></div>
            <div class="die-plus">+</div>
            <div class="die" id="die2"><span class="die-face">?</span></div>
          </div>
          <div id="flow-text" class="flow-text">洗牌中…</div>
          <div id="flow-sub" class="flow-sub"></div>
        </div>
      </div>

      <div id="result-overlay" class="overlay hidden">
        <div class="result-card">
          <h2 id="result-title">胡牌</h2>
          <p id="result-body"></p>
          <div class="result-btns">
            <button id="btn-next" type="button" class="btn primary">下一局</button>
            <button id="btn-restart" type="button" class="btn">返回选难度</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/tiles.js"></script>
  <script src="js/rules.js"></script>
  <script src="js/difficulty.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/avatars.js"></script>
  <script src="js/status.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/wall.js"></script>
  <script src="js/dice.js"></script>
  <script src="js/game.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/device.js"></script>
  <script src="js/version.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
